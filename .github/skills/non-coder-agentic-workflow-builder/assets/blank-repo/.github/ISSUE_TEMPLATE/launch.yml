name: Launch / Bet / Project
description: A shippable milestone, review, bet, study, or project
title: "[Launch] "
labels: ["launch"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What are we doing and why?
      placeholder: "One clear paragraph."
    validations:
      required: true
  - type: dropdown
    id: phase
    attributes:
      label: Phase
      description: Where is this work right now?
      options:
        - Planning
        - Team
        - Alpha
        - Beta
        - GA
        - Done
    validations:
      required: true
  - type: input
    id: owner
    attributes:
      label: Owner
      description: Who is directly responsible for this work?
      placeholder: "@username or team name"
    validations:
      required: true
  - type: input
    id: target-date
    attributes:
      label: Target Date
      description: When is the next meaningful milestone?
      placeholder: "YYYY-MM-DD"
  - type: textarea
    id: customer-or-team-impact
    attributes:
      label: Customer or Team Impact
      description: Who is affected and what changes for them?
      placeholder: |
        - Who:
        - What changes:
        - Risk if delayed:
  - type: textarea
    id: readiness
    attributes:
      label: Readiness Checklist
      description: What must be true before this is done?
      placeholder: |
        - [ ] Success criteria defined
        - [ ] Risks identified
        - [ ] Required reviewers identified
        - [ ] Communication plan ready
