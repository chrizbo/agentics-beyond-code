name: Intake Request
description: Submit a request, bug, idea, customer signal, or process improvement
title: "[Intake] "
labels: ["triage-needed"]
body:
  - type: dropdown
    id: request-type
    attributes:
      label: Request Type
      options:
        - Feature Request
        - Bug Report
        - Customer Feedback
        - Process Improvement
        - Research Question
        - Compliance / Risk
        - Other
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What are you requesting or reporting?
      placeholder: "One clear paragraph."
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or Signal
      description: What pain, opportunity, bug, or signal prompted this?
      placeholder: |
        - Who is affected?
        - What is happening?
        - Why does it matter?
    validations:
      required: true
  - type: dropdown
    id: urgency
    attributes:
      label: Urgency
      options:
        - Low
        - Medium
        - High
        - Critical
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Add links, examples, transcripts, customer quotes, screenshots, or data.
      placeholder: |
        - Link:
        - Example:
        - Data:
  - type: textarea
    id: success
    attributes:
      label: Desired Outcome
      description: What would a good resolution look like?
      placeholder: "Describe the outcome, not just the solution."
