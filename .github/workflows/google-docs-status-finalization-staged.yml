name: Google Docs Status Finalization Staged

on:
  discussion_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      discussion_url:
        description: "Existing Weekly Status Discussion linked to a shaped Google Doc."
        required: true

permissions:
  contents: read
  discussions: read

concurrency:
  group: google-docs-status-finalization-staged-${{ inputs.discussion_url }}
  cancel-in-progress: false

jobs:
  stage:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.comment.body == '/finalize-status'
    runs-on: ubuntu-latest
    environment: google-docs-demo
    env:
      GH_REPO: ${{ github.repository }}
      GH_TOKEN: ${{ github.token }}
      DISCUSSION_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.discussion_url || github.event.discussion.html_url }}
      DISCUSSION_TITLE_PREFIX: "[Weekly Status] "
      TRIGGER_KIND: ${{ github.event_name }}
      TRIGGER_ACTOR: ${{ github.actor }}
      TRIGGER_COMMAND: ${{ github.event.comment.body }}
      GOOGLE_DOCS_FINALIZER_LOGINS: ${{ vars.GOOGLE_DOCS_FINALIZER_LOGINS }}
      GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
      GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
      GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
      GOOGLE_DOCS_SCOPE_TYPE: ${{ vars.GOOGLE_DOCS_SCOPE_TYPE }}
      GOOGLE_DOCS_SCOPE_ROOT_ID: ${{ vars.GOOGLE_DOCS_SCOPE_ROOT_ID }}
      GOOGLE_DOCS_DRAFTS_FOLDER_ID: ${{ vars.GOOGLE_DOCS_DRAFTS_FOLDER_ID }}
      OUTPUT_DIR: /tmp/google-docs-status-finalization
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate and stage final Discussion body
        run: node .github/scripts/google-docs/status-finalization-dispatch.mjs

      - name: Upload staged finalization
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: google-docs-status-finalization
          path: /tmp/google-docs-status-finalization
          if-no-files-found: error
          retention-days: 7
