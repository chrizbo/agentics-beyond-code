name: Slack Report-Back Dispatch

on:
  workflow_run:
    workflows:
      - "Launch Readiness Report"
      - "Weekly Compliance Team Reports"
      - "Weekly GTM Team Report"
      - "Weekly Leadership Status Update"
      - "Weekly Leadership Brief"
      - "Weekly Agentic Workflow Health Report"
      - "Daily Standup Prep"
      - "Commitment Reconciler"
    types: [completed]
  workflow_dispatch:
    inputs:
      workflow_name:
        description: "Workflow name to report back for (e.g. 'Weekly Leadership Status Update'). Falls back to title-prefix search when no run ID is available."
        required: false
        default: ""
      run_id:
        description: "Run ID of the completed workflow to read safe-outputs-items from. Leave blank to search by title prefix."
        required: false
        default: ""

permissions:
  contents: read
  actions: read
  discussions: read

concurrency:
  group: slack-report-back-${{ github.event.workflow_run.id || inputs.run_id || inputs.workflow_name || github.run_id }}
  cancel-in-progress: false

jobs:
  report-back:
    if: |
      vars.SLACK_POSTBACK_ENABLED == 'true' &&
      vars.SLACK_ARTIFACT_CHANNEL_MAP != '' &&
      (
        github.event_name == 'workflow_dispatch' ||
        github.event.workflow_run.conclusion == 'success'
      )
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_ALLOWED_CHANNEL_IDS: ${{ vars.SLACK_ALLOWED_CHANNEL_IDS }}
      SLACK_ARTIFACT_CHANNEL_MAP: ${{ vars.SLACK_ARTIFACT_CHANNEL_MAP }}
      WORKFLOW_NAME: ${{ github.event.workflow_run.name || inputs.workflow_name }}
      SOURCE_RUN_ID: ${{ github.event.workflow_run.id || inputs.run_id }}
    steps:
      - name: Download safe-outputs-items artifact
        if: env.SOURCE_RUN_ID != ''
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: safe-outputs-items
          run-id: ${{ env.SOURCE_RUN_ID }}
          github-token: ${{ github.token }}
          path: /tmp/safe-outputs-items

      - name: Post Slack report-back
        run: |
          node <<'NODE'
          const { execFileSync } = require("node:child_process");
          const fs = require("node:fs");

          // SLACK_ARTIFACT_CHANNEL_MAP maps exact workflow names to Slack channel IDs.
          // Only workflows listed here will post report-backs.
          //
          // Example:
          // {
          //   "Weekly Leadership Status Update": "C0123456789",
          //   "Launch Readiness Report": "C9876543210"
          // }

          // Title prefixes for fallback search when no run artifact is available.
          const TITLE_PREFIXES = {
            "Launch Readiness Report":              "[Launch Readiness] ",
            "Weekly Compliance Team Reports":       "[Compliance] ",
            "Weekly GTM Team Report":               "[GTM] ",
            "Weekly Leadership Status Update":      "[Weekly Status] ",
            "Weekly Leadership Brief":              "[Leadership Brief] ",
            "Weekly Agentic Workflow Health Report": "[Workflow Health] ",
            "Daily Standup Prep":                   "[Standup Prep] ",
            "Commitment Reconciler":                "[Commitment Reconciliation] "
          };

          // Workflows that create issues instead of discussions.
          const ISSUE_WORKFLOWS = new Set(["Commitment Reconciler"]);

          async function main() {
            const token = process.env.SLACK_BOT_TOKEN;
            const repo = process.env.GH_REPO;
            const workflowName = String(process.env.WORKFLOW_NAME || "").trim();
            const allowedChannels = new Set(
              String(process.env.SLACK_ALLOWED_CHANNEL_IDS || "")
                .split(",")
                .map((v) => v.trim())
                .filter(Boolean)
            );

            if (!token) throw new Error("SLACK_BOT_TOKEN is not configured.");
            if (!allowedChannels.size) throw new Error("SLACK_ALLOWED_CHANNEL_IDS must contain at least one channel ID.");
            if (!workflowName) throw new Error("WORKFLOW_NAME is required.");

            let channelMap;
            try {
              channelMap = JSON.parse(process.env.SLACK_ARTIFACT_CHANNEL_MAP || "{}");
            } catch {
              throw new Error("SLACK_ARTIFACT_CHANNEL_MAP must be valid JSON.");
            }

            const channelId = channelMap[workflowName];
            if (!channelId) {
              console.log(`No Slack channel configured for workflow "${workflowName}". Skipping.`);
              return;
            }

            if (!allowedChannels.has(channelId)) {
              throw new Error(`Channel ${channelId} for "${workflowName}" is not in SLACK_ALLOWED_CHANNEL_IDS.`);
            }

            function gh(args) {
              return execFileSync("gh", args, { encoding: "utf8" });
            }

            // --- Primary: read URL from the safe-outputs-items artifact ---
            let artifactUrl, artifactTitle;

            const itemsFile = "/tmp/safe-outputs-items/safe-output-items.jsonl";
            if (fs.existsSync(itemsFile)) {
              const artifactType = ISSUE_WORKFLOWS.has(workflowName) ? "create_issue" : "create_discussion";
              const lines = fs.readFileSync(itemsFile, "utf8").trim().split("\n").filter(Boolean);
              for (const line of lines) {
                try {
                  const item = JSON.parse(line);
                  if (item.type === artifactType && item.url) {
                    artifactUrl = item.url;
                    // The artifact doesn't include a title — fetch it from the GitHub API.
                    if (artifactType === "create_discussion" && item.number) {
                      const [owner, repoName] = repo.split("/");
                      const titleQuery = `query($owner:String!,$repo:String!,$num:Int!){repository(owner:$owner,name:$repo){discussion(number:$num){title}}}`;
                      const titleResult = JSON.parse(gh([
                        "api", "graphql",
                        "-f", `query=${titleQuery}`,
                        "-f", `owner=${owner}`,
                        "-f", `repo=${repoName}`,
                        "-F", `num=${item.number}`
                      ]));
                      artifactTitle = titleResult.data?.repository?.discussion?.title || artifactUrl;
                    } else if (artifactType === "create_issue" && item.number) {
                      const issueData = JSON.parse(gh(["issue", "view", String(item.number), "--repo", repo, "--json", "title"]));
                      artifactTitle = issueData.title || artifactUrl;
                    } else {
                      artifactTitle = artifactUrl;
                    }
                    break;
                  }
                } catch { /* skip malformed lines */ }
              }
            }

            // --- Fallback: search by title prefix (manual workflow_dispatch without run_id) ---
            if (!artifactUrl) {
              console.log("No safe-outputs-items artifact found; falling back to title-prefix search.");
              const titlePrefix = TITLE_PREFIXES[workflowName];
              if (!titlePrefix) throw new Error(`No title prefix defined for workflow "${workflowName}".`);

              if (ISSUE_WORKFLOWS.has(workflowName)) {
                const issues = JSON.parse(gh([
                  "issue", "list", "--repo", repo, "--state", "open",
                  "--search", `"${titlePrefix.trim()}" in:title`,
                  "--limit", "5", "--json", "number,title,url,createdAt"
                ]));
                const recent = issues
                  .filter((i) => Date.now() - new Date(i.createdAt).getTime() < 24 * 60 * 60 * 1000)
                  .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt))[0];
                if (!recent) { console.log(`No recent issue found. Skipping.`); return; }
                artifactUrl = recent.url;
                artifactTitle = recent.title;
              } else {
                const query = `query($q: String!) {
                  search(query: $q, type: DISCUSSION, first: 5) {
                    nodes { ... on Discussion { title url createdAt } }
                  }
                }`;
                const result = JSON.parse(gh([
                  "api", "graphql",
                  "-f", `query=${query}`,
                  "-f", `q=repo:${repo} in:title "${titlePrefix.trim()}"`
                ]));
                const nodes = (result.data?.search?.nodes || [])
                  .filter((n) => n?.title?.startsWith(titlePrefix.trim()))
                  .filter((n) => Date.now() - new Date(n.createdAt).getTime() < 24 * 60 * 60 * 1000)
                  .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                if (!nodes.length) { console.log(`No recent discussion found. Skipping.`); return; }
                artifactUrl = nodes[0].url;
                artifactTitle = nodes[0].title;
              }
            }

            // Workflows that post a rich excerpt. Value is the heading to stop at.
            const EXCERPT_STOP = {
              "Weekly Leadership Status Update": "### 📊 Portfolio Snapshot",
              "Launch Readiness Report":         "### 🔴 High Risk"
            };

            function toSlack(md) {
              return md
                // Strip AW footer lines ("> Generated by ..." and "[x] expires ...")
                .replace(/^>.*Generated by[\s\S]*$/m, "")
                .replace(/^-\s*\[x\]\s*expires.*$/gm, "")
                // Strip HTML comments
                .replace(/<!--[\s\S]*?-->/g, "")
                // Strip horizontal rules
                .replace(/^---+$/gm, "")
                // Headings → bold
                .replace(/^#{1,6}\s+(.+)$/gm, "*$1*")
                // Bold **text** → *text*
                .replace(/\*\*(.+?)\*\*/g, "*$1*")
                // Inline code → backtick (already fine)
                // Markdown links [text](url) → <url|text>
                .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, "<$2|$1>")
                // Blockquotes > text → strip the >
                .replace(/^>\s?/gm, "")
                // Bullet * item → • item
                .replace(/^\* /gm, "• ")
                // Collapse 3+ blank lines to 2
                .replace(/\n{3,}/g, "\n\n")
                .trim();
            }

            let text;
            const stopHeading = EXCERPT_STOP[workflowName];
            if (stopHeading && artifactUrl.includes("/discussions/")) {
              try {
                const discussionNumber = parseInt(artifactUrl.split("/").pop(), 10);
                const [owner, repoName] = repo.split("/");
                const bodyQuery = `query($owner:String!,$repo:String!,$num:Int!){repository(owner:$owner,name:$repo){discussion(number:$num){body}}}`;
                const bodyResult = JSON.parse(gh([
                  "api", "graphql",
                  "-f", `query=${bodyQuery}`,
                  "-f", `owner=${owner}`,
                  "-f", `repo=${repoName}`,
                  "-F", `num=${discussionNumber}`
                ]));
                const fullBody = bodyResult.data?.repository?.discussion?.body || "";

                const stopIdx = fullBody.indexOf(stopHeading);
                const cropped = stopIdx > -1 ? fullBody.slice(0, stopIdx) : fullBody;
                const converted = toSlack(cropped);

                const MAX = 2900 - artifactUrl.length - 10;
                const truncated = converted.length > MAX
                  ? converted.slice(0, MAX) + "\n…"
                  : converted;

                text = `*<${artifactUrl}|${artifactTitle}>*\n${truncated}`;
              } catch (err) {
                console.log(`Failed to fetch discussion body: ${err.message}. Falling back to title+link.`);
                text = `${artifactTitle}\n${artifactUrl}`;
              }
            } else {
              text = `${artifactTitle}\n${artifactUrl}`;
            }

            const response = await fetch("https://slack.com/api/chat.postMessage", {
              method: "POST",
              headers: {
                "Authorization": `Bearer ${token}`,
                "Content-Type": "application/json; charset=utf-8"
              },
              body: JSON.stringify({ channel: channelId, text, unfurl_links: false, unfurl_media: false })
            });

            const result = await response.json();
            if (!response.ok || !result.ok) {
              throw new Error(`Slack post failed for "${workflowName}": ${result.error || response.statusText}`);
            }

            console.log(`Posted report-back for "${workflowName}" to ${channelId}: ${artifactTitle}`);
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE
